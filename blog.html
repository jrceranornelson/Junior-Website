  <!-- Preloader dismiss (about.js does not handle this) -->
  <script>
  (function () {
    const preloader = document.getElementById('preloader');
    if (!preloader) return;
    document.body.classList.add('preloading');
    function dismiss() {
      preloader.classList.add('preloader-done');
      document.body.classList.remove('preloading');
      preloader.addEventListener('transitionend', function () {
        preloader.remove();
      }, { once: true });
      // Safety fallback — remove even if transitionend never fires
      setTimeout(function () { preloader.remove(); }, 800);
    }
    setTimeout(dismiss, 2700);
  })();
  </script>

  <script>
  'use strict';

  (function () {
    var grid    = document.getElementById('blogGrid');
    var countEl = document.getElementById('blogCount');

    function esc(s) {
      return String(s || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function buildCard(id, post) {
      var imgInner = post.imageUrl
        ? '<img src="' + esc(post.imageUrl) + '" alt="' + esc(post.title) + '" loading="lazy" />'
        : '<div class="blog-img-placeholder"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>';

      var cat = post.category
        ? '<span class="blog-category-badge">' + esc(post.category) + '</span>'
        : '';

      var excerptRaw = post.excerpt || '';
      var excerpt = esc(excerptRaw.length > 160 ? excerptRaw.slice(0, 160) + '…' : excerptRaw);

      var card = document.createElement('article');
      card.className = 'blog-card';
      card.innerHTML =
        '<div class="blog-card-img">' + imgInner + '</div>' +
        '<div class="blog-card-body">' +
          cat +
          '<span class="blog-date">' + esc(post.date || '') + '</span>' +
          '<h3 class="blog-title">' + esc(post.title || 'Untitled') + '</h3>' +
          '<p class="blog-excerpt">' + excerpt + '</p>' +
          '<a href="blog-post.html?id=' + encodeURIComponent(id) + '" class="blog-link">Read more <span class="arrow">→</span></a>' +
        '</div>';
      return card;
    }

    // Fallback static articles shown when Firestore has no published posts
    var STATIC_ARTICLES = [
      { id:'haitian-diplomacy', imageUrl:'gallery/haitian-diplomacy.png', category:'Diplomacy', date:'March 2026',
        title:'Reimagining Haitian Diplomacy in the 21st Century',
        excerpt:'To help reintegrate Haiti into the world map of diplomacy, we must first understand that diplomacy in the 21st century is no longer built only through formal meetings, official speeches, and state-to-state relations.',
        href:'blog-haitian-diplomacy.html' },
      { id:'exclusion-kenya', imageUrl:'gallery/haiti-kenya.png', category:'Analyse', date:'19 Juillet 2025',
        title:"L\u2019exclusion d\u2019Ha\u00efti de la politique de visa exempt\u00e9 du Kenya",
        excerpt:"Une analyse diplomatique de l\u2019exclusion d\u2019Ha\u00efti de la mesure d\u2019exemption de visa annonc\u00e9e par le Kenya, et pourquoi le gouvernement ha\u00eftien doit r\u00e9pondre avec fermet\u00e9 souveraine.",
        href:'blog-exclusion-kenya.html' },
      { id:'gardez-silence', imageUrl:'gallery/gardez-le-silence.png', category:'Politique', date:'17 Juillet 2025',
        title:'\u00c0 ceux qui ont trahi l\u2019esp\u00e9rance du peuple ha\u00eftien\u00a0; gardez le silence\u00a0!',
        excerpt:"Une alerte \u00e0 la jeunesse ha\u00eftienne face aux figures politiques qui, apr\u00e8s avoir trahi la patrie, reprennent la parole pour appeler \u00e0 l\u2019unit\u00e9 \u2014 sans jamais reconna\u00eetre leurs fautes.",
        href:'blog-gardez-le-silence.html' },
      { id:'education-infrastructure', imageUrl:'gallery/education-infrastructure.png', category:'Education', date:'July 2022',
        title:'Education as National Infrastructure in Haiti',
        excerpt:'Why placing education at the center of national development is one of the most urgent and sustainable choices Haiti can make.',
        href:'blog-education-infrastructure.html' },
      { id:'nouvelle-diplomatie', imageUrl:'gallery/nouvelle-diplomatie.png', category:'Diplomatie', date:'7 Janvier 2022',
        title:'Une Nouvelle Diplomatie Ha\u00eftienne au Service du D\u00e9veloppement R\u00e9gional',
        excerpt:'La diplomatie peut jouer un r\u00f4le crucial dans notre plan de sauvetage \u2014 en servant le d\u00e9veloppement des r\u00e9gions rurales, en r\u00e9formant ses m\u00e9thodes et en \u00e9largissant ses horizons.',
        href:'blog-nouvelle-diplomatie.html' }
    ];

    function buildStaticCard(a) {
      var card = document.createElement('article');
      card.className = 'blog-card';
      card.innerHTML =
        '<div class="blog-card-img"><img src="' + esc(a.imageUrl) + '" alt="' + esc(a.title) + '" loading="lazy" /></div>' +
        '<div class="blog-card-body">' +
          '<span class="blog-category-badge">' + esc(a.category) + '</span>' +
          '<span class="blog-date">' + esc(a.date) + '</span>' +
          '<h3 class="blog-title">' + esc(a.title) + '</h3>' +
          '<p class="blog-excerpt">' + esc(a.excerpt.length > 160 ? a.excerpt.slice(0,160) + '\u2026' : a.excerpt) + '</p>' +
          '<a href="' + esc(a.href) + '" class="blog-link">Read more <span class="arrow">\u2192</span></a>' +
        '</div>';
      return card;
    }

    // Parse English and French date strings into a sort timestamp
    function parseDateStr(str) {
      if (!str) return 0;
      var months = {
        january:1,february:2,march:3,april:4,may:5,june:6,
        july:7,august:8,september:9,october:10,november:11,december:12,
        janvier:1,février:2,fevrier:2,mars:3,avril:4,mai:5,juin:6,
        juillet:7,août:8,aout:8,septembre:9,octobre:10,novembre:11,décembre:12,decembre:12
      };
      var s = str.toLowerCase().replace(/[,]/g, '');
      var parts = s.split(/\s+/);
      var day = 1, month = 0, year = 0;
      parts.forEach(function(p) {
        var n = parseInt(p, 10);
        if (!isNaN(n)) {
          if (n > 31) year = n; else if (n >= 1 && n <= 31 && day === 1 && month === 0) day = n;
        } else if (months[p]) {
          month = months[p];
        }
      });
      if (!year) return 0;
      return new Date(year, (month || 1) - 1, day).getTime();
    }

    function render(docs) {
      grid.innerHTML = '';
      // Hide only explicit drafts
      var fsDocs = docs.filter(function(d) { return d.data().status !== 'draft'; });
      var fsIds = fsDocs.map(function(d) { return d.id; });

      // Build unified list: { sortTs, element }
      var items = [];

      fsDocs.forEach(function(doc) {
        var d = doc.data();
        // Prefer the human-readable date field; fall back to createdAt timestamp
        var ts = parseDateStr(d.date) ||
                 (d.createdAt ? (d.createdAt.toMillis ? d.createdAt.toMillis() : (d.createdAt.seconds || 0) * 1000) : 0);
        items.push({ ts: ts, el: buildCard(doc.id, d) });
      });

      STATIC_ARTICLES.filter(function(a) { return fsIds.indexOf(a.id) === -1; })
        .forEach(function(a) {
          items.push({ ts: parseDateStr(a.date), el: buildStaticCard(a) });
        });

      // Sort newest first
      items.sort(function(a, b) { return b.ts - a.ts; });

      countEl.textContent = items.length + ' post' + (items.length !== 1 ? 's' : '');
      countEl.style.display = 'block';
      items.forEach(function(item) { grid.appendChild(item.el); });
    }

    function showError(msg) {
      countEl.style.display = 'none';
      grid.innerHTML =
        '<div class="blog-state">' +
          '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
          '<p>' + (msg || 'Could not load posts — please try again later.') + '</p>' +
        '</div>';
    }

    function sortDesc(docs) {
      return docs.slice().sort(function(a, b) {
        var as = (a.data().createdAt || {}).seconds || 0;
        var bs = (b.data().createdAt || {}).seconds || 0;
        return bs - as;
      });
    }

    // Page view tracker
    if (typeof firebase !== 'undefined' && db) {
      db.collection('_analytics').doc('blog').set(
        { views: firebase.firestore.FieldValue.increment(1), page: 'blog' },
        { merge: true }
      ).catch(function(){});
    }

    // Primary: orderBy query with onSnapshot
    db.collection('blog')
      .orderBy('createdAt', 'desc')
      .onSnapshot(
        function(snap) { render(snap.docs); },
        function(err) {
          // Index not built yet — fall back to unordered snapshot + client sort
          if (err.code === 'failed-precondition' || err.code === 'unimplemented') {
            db.collection('blog').onSnapshot(
              function(snap) { render(sortDesc(snap.docs)); },
              function() { showError(); }
            );
          } else {
            // Permission denied or network error — try a one-time .get()
            db.collection('blog').get()
              .then(function(snap) { render(sortDesc(snap.docs)); })
              .catch(function() { showError('Could not load posts — check Firestore rules at console.firebase.google.com'); });
          }
        }
      );
  })();
  </script>
